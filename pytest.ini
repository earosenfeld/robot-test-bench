[pytest]
# Only the tests/ tree contains real test suites. Several production modules
# under robot_testbench/ are named test_*.py / Test* (test_plan, test_analyzer,
# test_results, ...) and must NOT be collected as tests, so we scope collection
# to tests/ and tell pytest not to recurse into the package or build dirs.
testpaths = tests
norecursedirs = robot_testbench .venv venv build dist .git data examples assets reports
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --disable-warnings
filterwarnings =
    ignore::pytest.PytestCollectionWarning
    ignore::UserWarning
    ignore::DeprecationWarning
